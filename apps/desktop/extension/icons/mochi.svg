<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="mochiBody" cx="0.38" cy="0.30" r="0.85">
      <stop offset="0%"  stop-color="#fff5fa"/>
      <stop offset="55%" stop-color="#ffd9e8"/>
      <stop offset="100%" stop-color="#ffb3d1"/>
    </radialGradient>
    <radialGradient id="mochiBlush" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#ff8ab8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff8ab8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Squishy mochi blob — fills ~95% of canvas. Asymmetric so it reads as
       "soft squashed thing" rather than a perfect circle. -->
  <path d="M 64 6
           C 96 6, 122 28, 122 62
           C 122 94, 114 112, 96 120
           C 80 126, 64 124, 54 122
           C 32 118, 12 108, 6 86
           C 2 70, 4 50, 8 38
           C 18 18, 40 6, 64 6 Z"
        fill="url(#mochiBody)" stroke="#ff9ec5" stroke-width="3" stroke-linejoin="round"/>

  <!-- Top-left sheen -->
  <ellipse cx="40" cy="28" rx="22" ry="11" fill="#ffffff" opacity="0.55"/>

  <!-- Blush cheeks -->
  <circle cx="20" cy="78" r="16" fill="url(#mochiBlush)"/>
  <circle cx="104" cy="78" r="16" fill="url(#mochiBlush)"/>

  <!-- Eyes -->
  <g fill="#3a1a2a">
    <ellipse cx="44" cy="62" rx="9" ry="11"/>
    <ellipse cx="84" cy="62" rx="9" ry="11"/>
  </g>
  <g fill="#ffffff">
    <circle cx="47" cy="58" r="3"/>
    <circle cx="87" cy="58" r="3"/>
  </g>

  <!-- Happy smile -->
  <path d="M 50 90 Q 64 102 78 90"
        stroke="#3a1a2a" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Sparkle accent -->
  <g opacity="0.95" transform="translate(110,18)">
    <path d="M 0 -5 L 1.5 -1.5 L 5 0 L 1.5 1.5 L 0 5 L -1.5 1.5 L -5 0 L -1.5 -1.5 Z"
          fill="#ffffff" stroke="#ffaad0" stroke-width="0.8" stroke-linejoin="round"/>
  </g>
</svg>
