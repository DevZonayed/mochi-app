<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maestro — Budget Dashboard</title>
<link rel="stylesheet" href="../lib/tokens.css" />
<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .app-wallpaper { position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(60% 50% at 16% 0%, color-mix(in srgb, var(--blob-a) 28%, transparent), transparent 70%), radial-gradient(55% 50% at 100% 100%, color-mix(in srgb, var(--green) 12%, transparent), transparent 70%), var(--bg); }
  .nav-item:hover { background: var(--fill-tertiary); color: var(--ink); }
  .ws-header:hover { background: var(--fill-tertiary); }
  .search-field:hover { background: var(--fill-secondary); }
  .tb-icon:hover { background: var(--fill-secondary); color: var(--ink); }
  .primary-cta { transition: transform 120ms var(--spring), box-shadow 160ms ease, background 140ms ease; }
  .primary-cta:hover { box-shadow: 0 8px 22px rgba(0,122,255,0.4); }
  .primary-cta:active { transform: translateY(1px); }
  .ghost-btn:hover { background: color-mix(in srgb, var(--fill-secondary) 60%, var(--ink) 7%); }
  .step-btn:hover { background: color-mix(in srgb, var(--fill-secondary) 55%, var(--ink) 8%); }
  .cap-edit:hover { background: var(--fill-secondary); }
  .led-row:hover { background: var(--fill-tertiary); }
  .count-num { animation: countUp 400ms var(--spring); }
  @keyframes countUp { from { transform: translateY(-4px); } to { transform: none; } }
  .ring-sweep { animation: ringSweep 700ms var(--spring); }
  @keyframes ringSweep { from { stroke-dashoffset: 999; } }
  .sheet-pop { animation: sheetPop 220ms var(--spring); }
  @keyframes sheetPop { from { transform: translateY(-12px) scale(0.985); } to { transform: none; } }
  @keyframes paletteFade { from { opacity: 0.3; } to { opacity: 1; } }
  @keyframes palettePop { from { transform: translateY(-12px) scale(0.985); } to { transform: none; } }
  *::-webkit-scrollbar { width: 9px; height: 9px; }
  *::-webkit-scrollbar-thumb { background: var(--fill-secondary); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  ::selection { background: rgba(0,122,255,0.22); }
</style>
</head>
<body>
  <div id="root"></div>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg"><rect width="96" height="96" rx="22" fill="#1F8A5B"/><circle cx="48" cy="48" r="22" fill="none" stroke="#fff" stroke-width="6"/><path d="M48 26a22 22 0 0 1 22 22" fill="none" stroke="#FFD83B" stroke-width="6" stroke-linecap="round"/></svg>
  </template>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../lib/icons.jsx"></script>
  <script type="text/babel" src="../lib/ui.jsx"></script>
  <script type="text/babel" src="../lib/app-shell.jsx"></script>
  <script type="text/babel" src="../command-center/cc-palette.jsx"></script>
  <script type="text/babel" src="bg-views.jsx"></script>
  <script type="text/babel" src="bg-app.jsx"></script>
</body>
</html>
