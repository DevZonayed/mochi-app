name: Build native macOS app

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-macos-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build downloadable Maestro.app
    runs-on: macos-15
    env:
      MAESTRO_REQUIRE_EMBEDDED_NODE: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - id: version
        name: Compute build version
        run: node .github/scripts/next-native-version.mjs

      - name: Show toolchain
        run: |
          echo "MAESTRO_VERSION=${{ steps.version.outputs.version }}"
          node --version
          pnpm --version
          swift --version
          xcodebuild -version
          uname -m

      - name: Build production app bundle
        env:
          MAESTRO_VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x MacOS/app/package-app.sh
          MacOS/app/package-app.sh release

      - name: Zip app bundle
        env:
          MAESTRO_VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p artifacts
          SHORT_SHA="${GITHUB_SHA::7}"
          ZIP="artifacts/Maestro-macOS-${MAESTRO_VERSION}-${SHORT_SHA}.zip"
          ditto -c -k --keepParent MacOS/app/dist/Maestro.app "$ZIP"
          shasum -a 256 "$ZIP" > "$ZIP.sha256"
          ls -lh artifacts

      - name: Upload downloadable build
        uses: actions/upload-artifact@v6
        with:
          name: Maestro-macOS-${{ steps.version.outputs.version }}-${{ github.run_number }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30
