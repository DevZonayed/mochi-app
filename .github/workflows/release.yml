name: Release desktop app

# Every push to master (or a manual run) publishes a new desktop release with an
# AUTO-INCREMENTED version — no manual version bump needed. The patch bumps from
# the latest published release; bump major/minor in apps/desktop/package.json to
# start a new series. After publishing, the new version is synced back to
# package.json (a [skip ci] bot commit, so it doesn't re-trigger).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release + push the version sync commit

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/next-version.mjs

  release:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # --ignore-scripts: the desktop app needs no native builds — electron-builder
        # downloads Electron itself and esbuild resolves its own binary. This skips
        # the server's better-sqlite3 node-gyp compile, which fails on the macOS
        # (no distutils) and Windows (VS detection) runners.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build renderer + main process
        run: pnpm --filter @maestro/desktop build

      - name: Build installers & publish to GitHub Releases
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Inject the computed version (overrides package.json for this build).
        run: pnpm exec electron-builder --publish always -c.extraMetadata.version=${{ needs.version.outputs.version }}

  # Keep package.json in sync with the version we just shipped. Cosmetic + sets
  # the floor for the next run; never fails the release (the version logic reads
  # from releases, not package.json).
  bump:
    needs: [version, release]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Sync package.json version on master
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git fetch origin master
          git reset --hard origin/master
          node .github/scripts/set-version.mjs
          if git diff --quiet; then echo "already in sync"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): v$VERSION [skip ci]"
          git push origin HEAD:master
